<!DOCTYPE html>

<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="description"
          content="Smart Digital Technical Documentation">

    <title>SDTD Workspace</title>

    <link rel="stylesheet"
          href="css/style.css">

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.185.1/build/three.module.js",
            "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.185.1/examples/jsm/"
        }
    }
    </script>

</head>

<body>

<div id="sdtd-workspace">

    <!-- ===================================================== -->
    <!-- MAIN -->
    <!-- ===================================================== -->

    <main id="workspace-main">

        <!-- ============================================== -->
        <!-- LEFT SIDE -->
        <!-- ============================================== -->

        <section id="workspace-area">

            <!-- ========================================== -->
            <!-- PROJECT HEADER -->
            <!-- ========================================== -->

            <header id="workspace-header">

                <h1 id="project-title">

                    Loading...

                </h1>

                <div id="project-meta">

                    <span id="project-code">

                        ---

                    </span>

                </div>

            </header>

            <!-- ========================================== -->
            <!-- SVG / 3D / PDF -->
            <!-- ========================================== -->

            <section id="workspace-view">

                <div id="viewer-container">

                    <!--

                        SVG Viewer

                        PDF Viewer

                    -->

                </div>

                <div id="viewer-3d-container" style="display:none;">

                </div>

            </section>

            <!-- ========================================== -->
            <!-- BOM -->
            <!-- ========================================== -->

            <section id="bom-container">

                <div id="bom-header">

                    <span>

                        ▼ Bill of Materials

                    </span>

                </div>

                <div id="bom-content">

                </div>

            </section>

        </section>

        <!-- ============================================== -->
        <!-- RIGHT PANEL -->
        <!-- ============================================== -->

        <aside id="workspace-panel">

            <!-- ========================================== -->
            <!-- CLIENT -->
            <!-- ========================================== -->

            <section
                class="panel-section"
                id="client-section">

                <img
                    id="client-logo"
                    src="images/logo.png"
                    alt="Client Logo">

                <h2 id="client-name">

                    Loading...

                </h2>

            </section>

            <!-- ========================================== -->
            <!-- COMPONENT -->
            <!-- ========================================== -->

            <section
                class="panel-section"
                id="component-section">

                <h2>

                    Component

                </h2>

                <div id="component-content">

                    No component selected

                </div>

            </section>

            <!-- ========================================== -->
            <!-- INFORMATION -->
            <!-- ========================================== -->

            <section
                class="panel-section"
                id="information-section">

                <h2>

                    Information

                </h2>

                <div id="information-content">

                </div>

            </section>

            <!-- ========================================== -->
            <!-- DOCUMENTS -->
            <!-- ========================================== -->

            <section
                class="panel-section"
                id="documents-section">

                <h2>

                    Documents

                </h2>

                <div id="documents-content">

                </div>

            </section>

            <!-- ========================================== -->
            <!-- ACTIONS -->
            <!-- ========================================== -->

            <section
                class="panel-section"
                id="actions-section">

                <h2>

                    Actions

                </h2>

                <div id="actions-content">

                </div>

            </section>

        </aside>

    </main>

</div>

<div id="quote-modal-overlay" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <button id="quote-modal-close" class="modal-close" aria-label="Fermer">&times;</button>
        <h2 id="quote-modal-title">Demande de devis</h2>
        <div class="modal-readonly">
            <p><strong>Projet :</strong> <span id="quote-modal-project"></span></p>
            <div id="quote-modal-items"></div>
        </div>
        <form id="quote-modal-form">
            <label for="quote-name">Nom *</label>
            <input type="text" id="quote-name" name="name" required>

            <label for="quote-email">Courriel *</label>
            <input type="email" id="quote-email" name="email" required>

            <label for="quote-company">Entreprise</label>
            <input type="text" id="quote-company" name="company">

            <label for="quote-comments">Commentaires</label>
            <textarea id="quote-comments" name="comments" rows="4"></textarea>

            <input type="hidden" id="quote-hidden-subject" name="_subject">
            <input type="hidden" id="quote-hidden-details" name="details">

            <div class="modal-actions">
                <button type="submit" id="quote-modal-submit" class="action-button action-button-primary">
                    Envoyer la demande
                </button>
            </div>
            <p id="quote-modal-status" class="panel-hint"></p>
        </form>
    </div>
</div>

<!-- ===================================================== -->
<!-- APP (ES6 Module Entry Point) -->
<!-- ===================================================== -->

<script type="module" src="js/core/app.js"></script>

</body>

</html>
